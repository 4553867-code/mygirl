<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ура! 🥰❤️</title>

<!-- Подключаем твой файл стилей, чтобы фон остался градиентным -->
<link rel="stylesheet" href="style.css">

<style>
    /* Создаем изолированный контейнер для заднего фона с сердечками */
    #hearts-background {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1; 
        pointer-events: none;
        overflow: hidden;
    }

    /* Стили для картинки котиков (как на первой странице) */
    .profile-photo-container {
        margin-bottom: 25px;
        display: flex;
        justify-content: center;
        overflow: hidden; /* ОБРЕЗАЕТ ВСЕ ЛИШНИЕ ПОЛОСКИ ПО БОКАМ */
    }

    .profile-photo {
        width: 130px;         
        height: 130px;        
        object-fit: contain; 
        background-color: #ffffff; 
        border: none;         
    }

    /* Стили для подзаголовка */
    .subtitle {
        color: #ff4d6d;
        font-size: 16px;
        margin-top: -10px;
        margin-bottom: 30px;
        font-weight: 500;
    }

    /* Принудительно поднимаем карточку выше фона с сердечками */
    .container {
        position: relative;
        z-index: 100 !important; 
    }

    /* Финальная кнопка-подтверждение, ведущая на следующий экран */
    .final-btn {
        display: block;
        background: linear-gradient(135deg, #ff758f, #ff4d6d);
        color: white !important;
        padding: 15px 40px;
        font-size: 18px;
        font-weight: bold;
        text-decoration: none;
        border-radius: 20px;
        box-shadow: 0 6px 15px rgba(255, 77, 109, 0.3);
        transition: transform 0.2s ease;
    }

    .final-btn:hover {
        transform: scale(1.05);
    }

    /* Стили для падающих сердечек */
    .falling-heart {
        position: absolute; 
        top: -40px;
        user-select: none;
        pointer-events: none; 
        animation: fall linear forwards;
    }

    @keyframes fall {
        0% { transform: translateY(0) rotate(0deg); opacity: 0; }
        15% { opacity: 0.6; }
        85% { opacity: 0.6; }
        100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
    }
</style>
</head>
<body>

<!-- Контейнер для сердечек на заднем фоне -->
<div id="hearts-background"></div>

<div class="container">

    <!-- Картинка с котиками -->
    <div class="profile-photo-container">
        <img class="profile-photo" src="2.webp" alt="Ура!">
    </div>

    <h2>Подожди, ты действительно сказала да?</h2>
    
    <div class="subtitle">Я был готов что скажешь "нет" ахах</div>

    <div class="buttons">
        <a class="final-btn" href="next.html">Да Да дА</a>
    </div>

</div>

<!-- Скрипт для падающих сердечек -->
<script>
    function createHeart() {
        const bg = document.getElementById('hearts-background');
        if (!bg) return;

        const heart = document.createElement('div');
        heart.classList.add('falling-heart');
        
        const colors = ['#ffb3c1', '#ff85a1', '#fbb1bd', '#ffccd5', '#ff4d6d'];
        heart.style.color = colors[Math.floor(Math.random() * colors.length)];
        
        const heartTypes = ['❤️', '💖', '💝', '💕'];
        heart.innerText = heartTypes[Math.floor(Math.random() * heartTypes.length)];
        
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.fontSize = Math.random() * 25 + 20 + 'px';
        
        const duration = Math.random() * 4 + 5;
        heart.style.animationDuration = duration + 's';
        
        bg.appendChild(heart);
        
        setTimeout(() => { heart.remove(); }, duration * 1000);
    }
    setInterval(createHeart, 350);
</script>

</body>
</html>
