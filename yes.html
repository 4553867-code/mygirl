<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ура! 🥰❤️</title>

<!-- Подключаем ваш файл стилей, чтобы фон остался градиентным -->
<link rel="stylesheet" href="style.css">

<style>
    /* Стили для фотографии/картинки котиков */
    .profile-photo-container {
        margin-bottom: 25px;
        display: flex;
        justify-content: center;
    }

    .profile-photo {
        width: 150px;         
        height: 150px;        
        object-fit: contain; /* Чтобы рисованные котики не обрезались */
        background-color: #ffffff; 
        border: none;         
    }

    /* Стили для подзаголовка */
    .subtitle {
        color: #ff4d6d;
        font-size: 16px;
        margin-top: -10px;
        margin-bottom: 30px;
        font-weight: 500;
    }

    /* Финальная кнопка-подтверждение */
    .final-btn {
        display: block;
        background: linear-gradient(135deg, #ff758f, #ff4d6d);
        color: white !important;
        padding: 15px 40px;
        font-size: 18px;
        font-weight: bold;
        text-decoration: none;
        border-radius: 20px;
        box-shadow: 0 6px 15px rgba(255, 77, 109, 0.3);
    }
</style>
</head>
<body>

<div class="container">

    <!-- Картинка с обнимающимися котиками. Замените 2.webp на имя вашей новой картинки -->
    <div class="profile-photo-container">
        <img class="profile-photo" src="2.webp" alt="Ура!">
    </div>

    <h2>Подожди, ты действительно сказала да?</h2>
    
    <div class="subtitle">Я был готов что скажешь "нет" ахах</div>

    <div class="buttons">
        <a class="final-btn" href="#">Да Да дА</a>
    </div>

</div>

</body>
</html>
